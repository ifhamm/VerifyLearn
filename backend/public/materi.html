<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyLearn | Materials</title>
    <link rel="stylesheet" href="/styles/tailwind.css">
    <link rel="stylesheet" href="/styles/custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="/vendor/sweetalert2/sweetalert2.all.min.js"></script>
</head>

<body class="bg-white text-gray-900 font-sans h-screen flex overflow-hidden antialiased">

    <div id="left-sidebars" class="flex h-full shrink-0 transition-all duration-300">
        <aside class="w-64 flex flex-col border-r border-gray-200 h-full bg-white">
            <div class="p-6">
                <h1 class="text-2xl font-black tracking-tight uppercase flex items-center">
                    VerifyLearn<span class="text-orange-500 text-3xl leading-none">.</span>
                </h1>
            </div>
            <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
                <a href="index.html"
                    class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 rounded-lg hover:bg-gray-50 hover:text-gray-900 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    DASHBOARD
                </a>
                <div class="pt-4 pb-1">
                    <button
                        class="w-full flex items-center justify-between px-3 py-2 text-sm font-bold text-gray-900 rounded-lg hover:bg-gray-50 transition">
                        <div class="flex items-center gap-3">
                            <svg class="w-5 h-5 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                                </path>
                            </svg>
                            LEARNING
                        </div>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7">
                            </path>
                        </svg>
                    </button>
                    <div class="pl-11 mt-1 space-y-1">
                        <a href="myPath.html"
                            class="block px-3 py-2 text-sm font-medium text-gray-500 rounded-lg hover:bg-gray-50 hover:text-gray-900 transition">My
                            Path</a>
                        <a href="materi.html"
                            class="block px-3 py-2 text-sm font-bold text-orange-600 bg-orange-50 rounded-lg border-l-4 border-orange-500">Materials</a>
                        <a href="progress.html"
                            class="block px-3 py-2 text-sm font-medium text-gray-500 rounded-lg hover:bg-gray-50 hover:text-gray-900 transition">Progress</a>
                    </div>
                </div>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                    <p class="text-xs font-bold text-gray-500 mb-2">Integrity Score</p>
                    <div class="flex items-baseline gap-1">
                        <span id="sidebarScore" class="text-2xl font-black">92</span><span class="text-sm font-medium text-gray-500">/
                            100</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5 mt-3 mb-2">
                        <div id="sidebarScoreBar" class="bg-orange-500 h-1.5 rounded-full" style="width: 92%"></div>
                    </div>
                    <p id="sidebarScoreLabel" class="text-xs font-medium text-gray-500">Excellent</p>
                </div>
            </div>
        </aside>
    </div>

    <div class="flex h-full shrink-0 transition-all duration-300">
        <aside class="w-72 flex flex-col border-r border-gray-200 bg-gray-50/50 h-full">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-4">
                    <button id="toggle-left-btn" class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition"
                        title="Toggle Navigation">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h7"></path>
                        </svg>
                    </button>
                    <h2 id="pathTitle" class="font-bold text-gray-900">Path</h2>
                </div>
                <div class="flex items-center justify-between mt-2">
                    <span id="progressText" class="text-xs font-medium text-gray-500">Progress 0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1 mt-1">
                    <div id="progressBar" class="bg-orange-500 h-1 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div id="sidebarTopics" class="flex-1 overflow-y-auto p-4 space-y-6 animate-pulse">
                <div class="space-y-4">
                    <div class="h-3 bg-gray-200 rounded w-1/4"></div>
                    <div class="h-5 bg-gray-300 rounded w-3/4 mb-4"></div>
                    <div class="space-y-3 pt-2">
                        <div class="h-10 bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg"></div>
                        <div class="h-10 bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg"></div>
                        <div class="h-10 bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg"></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <main class="flex-1 flex flex-col h-full bg-white relative min-w-0">
        <header class="h-16 border-b border-gray-200 flex items-center justify-between px-6 shrink-0 bg-white z-10">
            <div class="flex items-center">
                <button id="backBtn"
                    class="flex items-center gap-2 text-sm font-bold text-gray-600 hover:text-gray-900 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Path
                </button>
            </div>
            <div class="flex items-center gap-3">
                <button id="prevBtn"
                    class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-gray-600 hover:bg-gray-100 rounded-lg transition sm:flex">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    Previous
                </button>
                <button id="nextBtn"
                    class="flex items-center gap-2 px-6 py-2 text-sm font-bold text-white bg-orange-500 hover:bg-orange-600 rounded-lg transition">
                    Next
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <article class="flex-1 overflow-y-auto p-10 lg:pl-12 lg:pr-16 max-w-5xl mx-auto w-full">
                <h1 id="materialTitle" class="text-4xl font-bold text-gray-900 mb-6">Loading Material...</h1>
                <div id="materialContent" class="prose prose-gray max-w-none">
                    <p class="text-gray-500">Preparing learning materials...</p>
                </div>
            </article>

            <aside id="right-sidebar"
                class="w-72 border-l border-gray-200 bg-gray-50/30 overflow-y-auto p-6 space-y-6 shrink-0 transition-all duration-300 hidden lg:block">
                <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
                    <h3 class="font-bold text-gray-900 mb-3 text-sm">Your Notes</h3>
                    <textarea
                        id="noteTextarea"
                        class="w-full h-24 bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
                        placeholder="Write your notes here..."></textarea>
                    <button
                        id="saveNoteBtn"
                        class="mt-3 w-full px-4 py-2 text-sm font-bold text-white bg-orange-500 hover:bg-orange-600 rounded-lg transition">Save Note
                    </button>
                </div>
            </aside>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="js/material.js"></script>
</body>

</html>
