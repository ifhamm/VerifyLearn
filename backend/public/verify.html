<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerifyLearn | Blockchain Verification</title>
  <link rel="stylesheet" href="/styles/tailwind.css">
  <link rel="stylesheet" href="/styles/custom.css">
  <script src="/vendor/sweetalert2/sweetalert2.all.min.js"></script>
</head>

<body class="bg-base text-textMain font-sans antialiased overflow-x-hidden selection:bg-brandOrange selection:text-white min-h-screen flex flex-col">

  <header class="w-full bg-base/90 border-b-2 border-textMain z-50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="text-2xl font-black tracking-tighter uppercase">
        Verify<span class="text-brandOrange">Learn.</span>
      </a>
      <a href="/"
        class="px-6 py-2.5 text-sm font-bold text-textMain bg-white border-2 border-textMain hover:bg-panel transition shadow-brutal uppercase">
        Back to Home
      </a>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center py-20 px-6 relative">
    <div class="absolute inset-0 bg-grid-pattern opacity-50 pointer-events-none" style="background-size: 32px 32px;"></div>
    
    <div class="relative z-10 w-full max-w-3xl">
      <div class="text-center mb-12">
        <h1 class="text-5xl md:text-6xl font-black tracking-tighter uppercase mb-4">
          Public <span class="text-brandViolet">Verification</span>
        </h1>
        <p class="text-lg text-textMuted font-bold">
          Verify on-chain credentials and Soulbound Tokens (SBT) of VerifyLearn graduates.
        </p>
      </div>

      <div class="bg-white border-4 border-textMain p-8 shadow-brutal mb-12">
        <label for="walletInput" class="block text-sm font-black uppercase mb-3 text-textMain tracking-widest">
          Enter Wallet Address
        </label>
        <div class="flex flex-col sm:flex-row gap-4">
          <input type="text" id="walletInput" placeholder="0x..." 
            class="flex-grow border-2 border-textMain px-4 py-3 bg-base font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brandOrange transition placeholder-gray-400" />
          <button id="verifyBtn" 
            class="px-8 py-3 bg-brandOrange text-white font-black uppercase border-2 border-textMain shadow-brutal-sm hover:bg-brandViolet transition whitespace-nowrap">
            Verify Now
          </button>
        </div>
      </div>

      <!-- Results Section -->
      <div id="resultsSection" class="hidden space-y-8">
        
        <!-- User Profile Card -->
        <div class="bg-base border-2 border-textMain p-6 shadow-brutal-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
          <div>
            <h2 class="text-xs font-black text-brandViolet uppercase tracking-widest mb-1">Learner Profile</h2>
            <div class="text-2xl font-black uppercase" id="userNameDisplay">--</div>
            <div class="text-sm font-mono text-textMuted mt-1 break-all" id="walletDisplay">--</div>
          </div>
          <div class="text-center md:text-right">
            <div class="text-xs font-black text-textMuted uppercase tracking-widest mb-1">Integrity Score</div>
            <div class="text-4xl font-black text-brandOrange" id="scoreDisplay">--</div>
          </div>
        </div>

        <!-- SBT Credentials -->
        <div>
          <h3 class="text-xl font-black uppercase tracking-tight mb-4 flex items-center gap-2">
            <span class="w-3 h-3 bg-brandOrange border border-textMain block"></span>
            Soulbound Tokens (SBT)
          </h3>
          
          <div id="sbtList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Loading state or empty state -->
          </div>
        </div>

      </div>
      
      <!-- Loading State -->
      <div id="loadingState" class="hidden text-center py-12">
        <div class="inline-block animate-spin w-12 h-12 border-4 border-textMain border-t-brandOrange rounded-full mb-4"></div>
        <p class="font-bold text-textMuted uppercase tracking-widest text-sm">Querying Blockchain...</p>
      </div>

    </div>
  </main>

  <footer class="py-8 bg-panel border-t-2 border-textMain text-center mt-auto relative z-10">
    <p class="text-textMain font-bold text-sm uppercase tracking-widest">&copy; 2026 VerifyLearn. The Immutable Ecosystem.</p>
  </footer>

  <script src="/js/verify.js"></script>
</body>

</html>
