version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verify-learn-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - AI_SERVICE_URL=http://python_ai:8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/verify_learn
      - RPC_URL=${RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      - SYSTEM_PRIVATE_KEY=${SYSTEM_PRIVATE_KEY:-}
      - SBT_CONTRACT_ADDRESS=${SBT_CONTRACT_ADDRESS:-}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./python_ai:/app/python_ai:ro
      - /app/node_modules
    command: npm run dev
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: verify-learn-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=verify_learn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  python_ai:
    build:
      context: ./python_ai
      dockerfile: Dockerfile
    container_name: verify-learn-python-ai
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./python_ai:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

volumes:
  postgres_data:


